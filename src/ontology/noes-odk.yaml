id: noes
title: "NOES Onto: Nonoriented Electrical Steel Ontology"
github_org: cmllezr
git_main_branch: main
repo: NOES-Onto
uribase: https://w3id.org/pmd
uribase_suffix: noes
preferredPrefix: NOES
edit_format: owl

# DISABLE Templates for now
use_templates: false

# Imports
import_group:
  annotation_properties: ['rdfs:label', 'IAO:0000119','IAO:0000115', 'IAO:0000116', 'IAO:0000112', 'skos:definition', 'skos:example', 'skos:comment', 'skos:altLabel' ]
  
  products:
    - id: pmdco
      title: "PMD Core Ontology"
      # mirror_from: https://materialdigital.github.io/core-ontology/ontology.owl
      mirror_from: https://raw.githubusercontent.com/materialdigital/core-ontology/refs/heads/main/src/ontology/pmdco.ttl
    - id: tto
      mirror_from: https://raw.githubusercontent.com/materialdigital/tensile-test-ontology/refs/heads/main/tto-full.owl 
      module_type: custom
    - id: uo
      mirror_from: https://raw.githubusercontent.com/bio-ontology-research-group/unit-ontology/refs/heads/master/uo-full.owl
      module_type: custom

# Components
components:
  products:
    - filename: imports-edit.owl
    - filename: noes-axioms-shared.owl
    - filename: noes-characterization.owl
    - filename: noes-manufacturing.owl
    - filename: noes-materials.owl
    - filename: noes-texture.owl
    - filename: noes-shared.owl

# Release
primary_release: full
release_artefacts:
  - base
  - full
export_formats:
  - owl
  - ttl

ci:
  - github_actions

namespaces:
  - https://w3id.org/pmd/noes/
idranges:
  - idsfor: noes
    idprefix: https://w3id.org/pmd/noes/NOES_
    iddigits: 7

idranges:
  - idsfor: noes
    idprefix: https://w3id.org/pmd/noes/NOES_
    iddigits: 7
